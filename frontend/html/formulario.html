<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../ico/icon_news.png">
    <link rel="stylesheet" href="../css/formulario.css">
    <script src="../js/formulario.js" defer></script>
    <title>Cadastrar Notícia</title>
</head>
<body class="claro">
    <header>
        <button onclick="alterar_tema()">Tema</button>
        <h1>Notícias Web</h1>
        <img src="../img/images.jpg" alt="webnews">
    </header>
    <nav>
        <a href="noticias.html">← Ver Notícias</a>
    </nav>
    <main>
        <section class="formulario-section">
            <h2>Cadastrar Nova Notícia</h2>
            <form id="form-noticia">
                <div class="campo">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" placeholder="Digite o título da notícia" required>
                </div>
                <div class="campo">
                    <label for="conteudo">Conteúdo</label>
                    <textarea id="conteudo" rows="5" placeholder="Digite o conteúdo da notícia" required></textarea>
                </div>
                <div class="campo">
                    <label for="caminho_imagem">Caminho da Imagem</label>
                    <input type="text" id="caminho_imagem" placeholder="Ex: ../img/noticia.jpg">
                </div>
                <div class="campo">
                    <label for="link">Link (leia mais)</label>
                    <input type="url" id="link" placeholder="https://exemplo.com/noticia">
                </div>
                <div id="mensagem"></div>
                <button type="button" onclick="inserir_noticia()">Cadastrar Notícia</button>
            </form>
        </section>
    </main>
    <footer></footer>
</body>
</html>
